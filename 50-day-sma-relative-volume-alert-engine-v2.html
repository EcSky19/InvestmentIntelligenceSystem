      );
    }

    /* ─────────────── MAIN APP ─────────────── */
    function App() {
      const [apiKey, setApiKey] = useState(() => localStorage.getItem(SK_APIKEY) || '');
      const [apiKeyInput, setApiKeyInput] = useState('');
      const [showKeyForm, setShowKeyForm] = useState(false);
      const [demoMode, setDemoMode] = useState(false);
      const [tier, setTier] = useState('T1');
      const [batchSz, setBatchSz] = useState('50');
      const [showLiq, setShowLiq] = useState(false);
      const [liqFilters, setLiqFilters] = useState({ ...LIQ_DEFAULTS });
      const [results, setResults] = useState([]);
      const [diff, setDiff] = useState(null);
      const [regime, setRegime] = useState({ label: 'Unknown', pctAbove: null, aboveCrosses: 0, belowCrosses: 0 });
      const [scanStats, setScanStats] = useState(null);
      const [selectedStock, setSelectedStock] = useState(null);
      const [toasts, setToasts] = useState([]);
      const [lastScan, setLastScan] = useState(() => localStorage.getItem(SK_LAST_SCAN) || null);
      const [kpiFilter, setKpiFilter] = useState(null);
      const [showT4Confirm, setShowT4Confirm] = useState(false);

      // Scan state
      const [scanState, setScanState] = useState({
        isRunning: false, isPaused: false, isDone: false,
        showDash: false,
        tier: 'T1', totalTickers: 0, scannedCount: 0, failedCount: 0, skippedCount: 0,
        batchIndex: 0, totalBatches: 0, batchSize: 50,
        currentTicker: '', lastAlert: null,
        loadingStage: '', pct: 0, resultsCount: 0,
        resumeAvailable: false, resumeInfo: null,
      });

      // Refs for scan control
      const pauseRef = useRef(false);
      const cancelRef = useRef(false);

      // Filter state
      const [fSector, setFSector] = useState('All Sectors');
      const [fIndustry, setFIndustry] = useState('All Industries');
      const [fCrossing, setFCrossing] = useState('Any');
      const [fRvol, setFRvol] = useState('Any');
      const [fDir, setFDir] = useState('Any Direction');
      const [fSearch, setFSearch] = useState('');
      const [sortKey, setSortKey] = useState('default');
      const [sortDir, setSortDir] = useState('desc');

      const toastRef = useRef(0);

      function showToast(title, msg, type = 'info', duration = 4500) {
        const id = ++toastRef.current;
        setToasts(t => [...t, { id, title, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), duration);
      }

      function saveKey() {
        const k = apiKeyInput.trim();
        if (!k) { showToast('No Key', 'Enter your Massive Stocks Starter API key.', 'warn'); return; }
        setApiKey(k); localStorage.setItem(SK_APIKEY, k); setShowKeyForm(false);
        showToast('API Key Saved', 'Key stored in localStorage.', 'success');
      }
      function clearKey() {
        setApiKey(''); setApiKeyInput('');
        localStorage.removeItem(SK_APIKEY);
        showToast('Key Cleared', 'API key removed.', 'info');
      }

      function updateSS(patch) { setScanState(s => ({ ...s, ...patch })); }

      /* Get universe tickers for selected tier */
      async function resolveUniverse(tierKey, apiKey, onProgress) {
        if (tierKey === 'T1') return [...new Set(SP500.slice(0, 503))];
        if (tierKey === 'T2') return T2_TICKERS;

        // T3/T4: start from large curated lists (guaranteed to work),
        // then optionally try to enhance with live API reference data
        const baselist = tierKey === 'T4' ? T4_TICKERS : T3_TICKERS;

        onProgress(`Loading ${tierKey} universe (${baselist.length.toLocaleString()} curated tickers)…`);
        await sleep(100);

        // Optionally try to fetch live ticker list to supplement curated base
        // Only attempt if key looks valid; treat any failure as non-fatal
        try {
          onProgress('Attempting to fetch live ticker reference from API (optional)…');
          const liveTickers = await fetchFullUniverse(apiKey, onProgress);
          if (liveTickers.length > baselist.length) {
            // Merge: live API list + curated base, deduped
            const merged = [...new Set([...baselist, ...liveTickers])];
            onProgress(`Universe ready: ${merged.length.toLocaleString()} tickers (API + curated)`);
            showToast('Universe Extended', `Live API added ${liveTickers.length - baselist.length} extra tickers to ${tierKey} universe.`, 'info');
            return merged;
          }
        } catch (e) {
          if (e.code === 'AUTH') throw e;
          // Non-fatal: just use the curated list — this is the expected path for Starter plan
          onProgress(`Using curated ${tierKey} universe (${baselist.length.toLocaleString()} tickers)`);
        }

        return baselist;
      }

      /* ── MAIN SCAN ── */
      async function startScan(resumeFrom = null) {
        if (!apiKey && !demoMode) { setShowKeyForm(true); showToast('API Key Required', 'Enter your Massive Stocks Starter API key.', 'warn'); return; }

        cancelRef.current = false;
        pauseRef.current = false;

        const bs = parseInt(batchSz) || 50;
        const today = new Date();
        const fromDate = dateStr(subtractDays(today, 120));
        const toDate = dateStr(today);

        /* DEMO MODE */
        if (demoMode) {
          updateSS({ isRunning: true, isPaused: false, isDone: false, showDash: true, tier, loadingStage: 'Generating demo data…', pct: 0, scannedCount: 0, failedCount: 0, skippedCount: 0, resultsCount: 0 });
          await sleep(300);
          const mockTickers = (tier === 'T1' ? SP500.slice(0, 100) : tier === 'T2' ? T2_TICKERS.slice(0, 150) : tier === 'T3' ? T3_TICKERS.slice(0, 300) : T4_TICKERS.slice(0, 400));
          const mockResults = mockTickers.map(t => generateMock(t));
          for (let i = 0; i < mockResults.length; i++) {
            if (cancelRef.current) break;
            if (pauseRef.current) { while (pauseRef.current && !cancelRef.current) await sleep(200); }
            updateSS({ pct: Math.round(i / mockResults.length * 100), loadingStage: `[${i + 1}/${mockResults.length}] ${mockTickers[i]}`, currentTicker: mockTickers[i], scannedCount: i + 1, resultsCount: i + 1, lastAlert: ['CA', 'CB', 'FA', 'FB', 'RC', 'LS', 'RJ'].includes(mockResults[i].status) ? mockResults[i] : null });
            await sleep(8);
          }
          const r = computeRegime(mockResults);
          setRegime(r);
          const prevMap = JSON.parse(sessionStorage.getItem(SK_PREV_SCAN) || '{}');
          const d = compareScans(mockResults, prevMap);
          setDiff(d);
          setResults(mockResults);
          setScanStats({ scanned: mockResults.length, failed: 0, skipped: 0 });
          const np = {}; mockResults.forEach(r => np[r.ticker] = r.status);
          sessionStorage.setItem(SK_PREV_SCAN, JSON.stringify(np));
          const now = new Date().toLocaleTimeString();
          setLastScan(now); localStorage.setItem(SK_LAST_SCAN, now);
          updateSS({ isRunning: false, isDone: true, pct: 100, loadingStage: 'Demo scan complete.', resultsCount: mockResults.length });
          showToast('DEMO SCAN COMPLETE', `${mockResults.length} stocks with mock data. NOT real market data.`, 'warn');
          return;
        }

        /* PRODUCTION SCAN */
        let universe;
        try {
          updateSS({ isRunning: true, isPaused: false, isDone: false, showDash: true, tier, loadingStage: 'Validating API key…', pct: 1, scannedCount: 0, failedCount: 0, skippedCount: 0, resultsCount: 0, batchIndex: 0 });

          // Validate key
          try {
            await apiFetch(`${API_BASE}/v2/aggs/ticker/AAPL/prev`, apiKey);
          } catch (e) {
            if (e.code === 'AUTH') {
              showToast('Auth Failed', 'Invalid API key.', 'error', 6000);
              updateSS({ isRunning: false, showDash: false });
              return;
            }
          }

          updateSS({ loadingStage: 'Resolving universe…', pct: 2 });
          universe = await resolveUniverse(tier, apiKey, (msg) => updateSS({ loadingStage: msg }));

          // Apply ETF filter (best-effort — common ETF tickers)
          const ETF_PATTERNS = /^(SPY|QQQ|IWM|DIA|GLD|SLV|TLT|HYG|LQD|VTI|VOO|ARKK|XLK|XLF|XLE|XLV|XLU|XLB|XLP|XLY|XLC|XLRE|XLI|VNQ|GDX|GDXJ|USO|UNG|XBI|IBB|SOXX|SMH|HACK|FINX|ROBO|BOTZ|MSOS|BITO|JETS|GBTC|IAU|BAR|SIVR|PSLV)$/;
          if (liqFilters.excludeETFs) {
            universe = universe.filter(t => !ETF_PATTERNS.test(t));
          }

        } catch (e) {
          if (e.code === 'AUTH') { showToast('Auth Failed', 'Invalid API key.', 'error', 6000); }
          else showToast('Universe Error', e.message || 'Failed to build universe.', 'error');
          updateSS({ isRunning: false, showDash: false });
          return;
        }

        // Check for resume
        let startBatch = 0;
        let accResults = [];
        let scanned = 0, failed = 0, skipped = 0;

        if (resumeFrom) {
          try {
            const saved = JSON.parse(sessionStorage.getItem(SK_PROGRESS) || 'null');
            if (saved && saved.tier === tier) {
              startBatch = saved.batchIndex || 0;
              accResults = saved.results || [];
              scanned = saved.scanned || 0; failed = saved.failed || 0; skipped = saved.skipped || 0;
              setResults([...accResults]);
              showToast('Scan Resumed', `Resuming from batch ${startBatch + 1} with ${accResults.length} results saved.`, 'info');
            }
          } catch (e) { }
        }

        const batches = chunk(universe, bs);
        const totalBatches = batches.length;
        updateSS({ totalTickers: universe.length, totalBatches, batchSize: bs });

        for (let bi = startBatch; bi < batches.length; bi++) {
          if (cancelRef.current) break;

          // Pause handling
          while (pauseRef.current && !cancelRef.current) {
            // Save progress while paused
            sessionStorage.setItem(SK_PROGRESS, JSON.stringify({ tier, batchIndex: bi, results: accResults, scanned, failed, skipped, resultsCount: accResults.length }));
            await sleep(300);
          }
          if (cancelRef.current) break;

          updateSS({ batchIndex: bi + 1, pct: Math.round((bi / batches.length) * 95) + 2 });

          const batch = batches[bi];
          for (let ti = 0; ti < batch.length; ti++) {
            if (cancelRef.current) break;
            while (pauseRef.current && !cancelRef.current) await sleep(200);
            if (cancelRef.current) break;

            const ticker = batch[ti];
            updateSS({ currentTicker: ticker, loadingStage: `Batch ${bi + 1}/${totalBatches} · [${scanned + failed + skipped + 1}/${universe.length}] ${ticker}` });

            try {
              await sleep(100); // rate-limit throttle
              const result = await scanTicker(ticker, apiKey, liqFilters, fromDate, toDate);
              if (result) {
                scanned++;
                accResults.push(result);
                const isAlert = ['CA', 'FA', 'RC', 'CB', 'FB', 'LS', 'RJ'].includes(result.status);
                updateSS({ scannedCount: scanned, failedCount: failed, skippedCount: skipped, resultsCount: accResults.length, lastAlert: isAlert ? result : undefined });
                // Stream into table every 5 results
                if (accResults.length % 5 === 0) setResults([...accResults]);
              } else {
                skipped++;
                updateSS({ skippedCount: skipped });
              }
            } catch (e) {
              if (e.code === 'AUTH') { showToast('Auth Error', 'Invalid API key.', 'error', 6000); cancelRef.current = true; break; }
              if (e.code === 'RATE') { await sleep(15000); }
              failed++;
              updateSS({ failedCount: failed });
            }
          }

          // Save checkpoint after each batch
          if (!cancelRef.current) {
            sessionStorage.setItem(SK_PROGRESS, JSON.stringify({ tier, batchIndex: bi + 1, results: accResults, scanned, failed, skipped, resultsCount: accResults.length }));
            // Stream batch results
            setResults([...accResults]);
          }

          // Pause between batches
          if (bi < batches.length - 1 && !cancelRef.current) await sleep(300);
        }

        // Finalize
        const finalResults = accResults;
        const r = computeRegime(finalResults);
        setRegime(r);
        const prevMap = JSON.parse(sessionStorage.getItem(SK_PREV_SCAN) || '{}');
        const d = compareScans(finalResults, prevMap);
        setDiff(d);
        setResults(sortResults(finalResults, 'default', 'desc'));
        setScanStats({ scanned, failed, skipped, tier, universe: universe.length });
        saveAlertHistory(finalResults);
        const np = {}; finalResults.forEach(r => np[r.ticker] = r.status);
        sessionStorage.setItem(SK_PREV_SCAN, JSON.stringify(np));
        // Clear progress on complete
        if (!cancelRef.current) sessionStorage.removeItem(SK_PROGRESS);
        const now = new Date().toLocaleTimeString();
        setLastScan(now); localStorage.setItem(SK_LAST_SCAN, now);

        const abC = finalResults.filter(r => ['CA', 'FA', 'RC'].includes(r.status)).length;
        const blC = finalResults.filter(r => ['CB', 'FB', 'LS'].includes(r.status)).length;
        updateSS({ isRunning: false, isPaused: false, isDone: !cancelRef.current, pct: 100, loadingStage: cancelRef.current ? 'Scan cancelled.' : 'Scan complete.', scannedCount: scanned, failedCount: failed, skippedCount: skipped, resultsCount: finalResults.length, currentTicker: '' });
        showToast(cancelRef.current ? 'Scan Cancelled' : 'Scan Complete', `${scanned} scanned · ${abC} above crosses · ${blC} below crosses`, 'success');
      }

      function handleScanClick() {
        if (scanState.isRunning) return;
        // Check for resume
        try {
          const saved = JSON.parse(sessionStorage.getItem(SK_PROGRESS) || 'null');
          if (saved && saved.tier === tier && (saved.resultsCount || 0) > 0 && !demoMode) {
            setScanState(s => ({ ...s, showDash: true, resumeAvailable: true, resumeInfo: { tier: saved.tier, batchIndex: saved.batchIndex, resultsCount: saved.resultsCount } }));
            return;
          }
        } catch (e) { }

        if (tier === 'T4' && !demoMode) { setShowT4Confirm(true); return; }
        setScanState(s => ({ ...s, showDash: true, resumeAvailable: false }));
        startScan(false);
      }

      function handleResumeChoice(doResume) {
        setScanState(s => ({ ...s, resumeAvailable: false, resumeInfo: null }));
        startScan(doResume);
      }

      function handlePause() {
        pauseRef.current = true;
        updateSS({ isPaused: true, isRunning: true });
      }

      function handleResume() {
        pauseRef.current = false;
        updateSS({ isPaused: false, isRunning: true });
      }

      function handleCancel() {
        cancelRef.current = true;
        pauseRef.current = false;
        updateSS({ isPaused: false });
      }

      function handleDone() {
        updateSS({ showDash: false, isRunning: false, isDone: false });
      }

      // Filtered + sorted results
      const displayResults = useMemo(() => {
        let r = [...results];
        if (fSector !== 'All Sectors') r = r.filter(x => x.sector === fSector);
        if (fIndustry !== 'All Industries') r = r.filter(x => x.industry === fIndustry);
        if (fCrossing !== 'Any') {
          const entry = Object.entries(STATUS_CODES).find(([, v]) => v === fCrossing);
          if (entry) r = r.filter(x => x.status === entry[0]);
        }
        r = r.filter(x => rvolFilterPass(x.relVol20, fRvol));
        if (fDir === 'Bullish Only') r = r.filter(x => x.direction === 'Bullish');
        else if (fDir === 'Bearish Only') r = r.filter(x => x.direction === 'Bearish');
        else if (fDir === 'Neutral / Testing Only') r = r.filter(x => x.direction === 'Neutral');
        if (fSearch) { const q = fSearch.toLowerCase(); r = r.filter(x => x.ticker.toLowerCase().includes(q) || x.company.toLowerCase().includes(q)); }
        if (kpiFilter === 'above') r = r.filter(x => ['CA', 'FA', 'RC'].includes(x.status));
        else if (kpiFilter === 'below') r = r.filter(x => ['CB', 'FB', 'LS'].includes(x.status));
        else if (kpiFilter === 'hirvol') r = r.filter(x => (x.relVol20 || 0) > 1.5);
        else if (kpiFilter === 'extreme') r = r.filter(x => (x.relVol20 || 0) > 3);
        else if (kpiFilter === 'testing') r = r.filter(x => ['TB', 'TA'].includes(x.status));
        else if (kpiFilter === 'rejected') r = r.filter(x => x.status === 'RJ');
        return sortResults(r, sortKey, sortDir);
      }, [results, fSector, fIndustry, fCrossing, fRvol, fDir, fSearch, sortKey, sortDir, kpiFilter]);

      const kpiAbove = results.filter(r => ['CA', 'FA', 'RC'].includes(r.status)).length;
      const kpiBelow = results.filter(r => ['CB', 'FB', 'LS'].includes(r.status)).length;
      const kpiHiRvol = results.filter(r => (r.relVol20 || 0) > 1.5).length;
      const kpiExtreme = results.filter(r => (r.relVol20 || 0) > 3).length;
      const kpiTesting = results.filter(r => ['TB', 'TA'].includes(r.status)).length;
      const kpiRejected = results.filter(r => r.status === 'RJ').length;
      const kpiScanned = results.length;
      const kpiTotal = scanState.totalTickers || 0;

      function handleSort(key) { if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortKey(key); setSortDir('desc'); } }

      function clearFilters() { setFSector('All Sectors'); setFIndustry('All Industries'); setFCrossing('Any'); setFRvol('Any'); setFDir('Any Direction'); setFSearch(''); setKpiFilter(null); }
      const hasFilters = fSector !== 'All Sectors' || fIndustry !== 'All Industries' || fCrossing !== 'Any' || fRvol !== 'Any' || fDir !== 'Any Direction' || fSearch || kpiFilter;

      const regimeCls = regime.label === 'Bullish' ? 'regime-bull' : regime.label === 'Bearish' ? 'regime-bear' : regime.label === 'Neutral' ? 'regime-neutral' : 'regime-unknown';
      const regimeLabel = regime.label === 'Unknown' ? 'UNKNOWN · No Scan Data' : `${regime.label.toUpperCase()} · ${regime.pctAbove != null ? regime.pctAbove.toFixed(0) + '% Above 50DMA' : '—'}`;

      const tierInfo = TIERS[tier] || TIERS.T1;
      const tierCls = tier === 'T3' ? 't3' : tier === 'T4' ? 't4' : '';

      const activeLiqFilters = [
        liqFilters.minPrice !== '2' && `$${liqFilters.minPrice}+ price`,
        liqFilters.minAvgVol !== '250000' && `${fmtVol(parseInt(liqFilters.minAvgVol))}+ avg vol`,
        liqFilters.minDollarVol !== '5000000' && `$${fmtVol(parseInt(liqFilters.minDollarVol))}+ $ vol`,
        liqFilters.minHistory !== '60' && `${liqFilters.minHistory}d+ history`,
        liqFilters.excludeETFs && 'No ETFs',
        liqFilters.marketCapTier !== 'All' && `${liqFilters.marketCapTier} cap`,
      ].filter(Boolean);

      function SortTh({ label, sk }) {
        const a = sortKey === sk;
        return <th onClick={() => handleSort(sk)} className={a ? 'sort-active' : ''}>{label}<span className={`sort-icon${a ? ' active' : ''}`}>{a ? (sortDir === 'asc' ? '▲' : '▼') : '⇅'}</span></th>;
      }

      return (
        <div className="page">

          {/* ── HEADER ── */}
          <header className="header">
            <div className="header-top-row">
              <div className="header-left">
                <div className="logo-mark">↕50</div>
                <div>
                  <div className="engine-title">50-DAY SMA CROSSING ENGINE v2.0</div>
                  <div className="engine-sub">Tiered Universe · Liquidity Filters · Batch Scan · Real Massive Data · Last scan: {lastScan || '—'}</div>
                </div>
              </div>
              <div className="header-right">
                <span className={`regime-badge ${regimeCls}`}>
                  {regime.label === 'Bullish' && '▲ '}{regime.label === 'Bearish' && '▼ '}{regime.label === 'Neutral' && '→ '}
                  {regimeLabel}
                </span>
                <span className={`freshness-badge${demoMode ? ' demo' : scanState.isRunning ? ' scanning' : !scanStats ? ' await' : ''}`}>
                  {demoMode ? '⚠ DEMO MODE' : scanState.isRunning ? 'SCANNING…' : scanStats ? '15-MIN DELAYED' : 'AWAITING SCAN'}
                </span>
                <button className={`icon-btn purple-btn${demoMode ? ' active' : ''}`} onClick={() => setDemoMode(d => !d)}>
                  {demoMode ? 'DEMO ON' : 'DEMO'}
                </button>
                <button className="icon-btn" onClick={() => { setShowKeyForm(s => !s); setApiKeyInput(apiKey); }}>
                  {apiKey ? '✓ KEY SET' : 'SET KEY'}
                </button>
                <button
                  className={`scan-btn${scanState.isRunning && !scanState.isPaused ? ' scanning' : scanState.isPaused ? ' paused' : ''}`}
                  onClick={scanState.isRunning && !scanState.isPaused ? handlePause : scanState.isPaused ? handleResume : handleScanClick}
                  disabled={!apiKey && !demoMode}
                >
                  {scanState.isRunning && !scanState.isPaused ? '⏸ PAUSE' : scanState.isPaused ? '▶ RESUME' : '↕ SCAN NOW'}
                </button>
                {scanState.isRunning && <button className="icon-btn danger" onClick={handleCancel}>✕ CANCEL</button>}
              </div>
            </div>

            {showKeyForm && (
              <div className="inline-key-form">
                <span className="inline-key-label">MASSIVE KEY:</span>
                <div className="inline-key-row">
                  <input className="inline-key-input" type="password"
                    placeholder="Paste your Massive Stocks Starter API key…"
                    value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && saveKey()}
                  />
                  <button className="inline-key-save" onClick={saveKey}>SAVE</button>
                  <button className="inline-key-clear" onClick={clearKey}>CLEAR</button>
                </div>
                <span className={`key-status ${apiKey ? 'ok' : 'missing'}`}>{apiKey ? '✓ Key stored' : 'No key set'}</span>
              </div>
            )}

            {/* ── CONTROLS ROW ── */}
            <div className="controls-row">
              {/* Universe Tier */}
              <select
                className={`ctrl-select tier-select${tier === 'T3' ? ' t3' : tier === 'T4' ? ' t4' : ''}`}
                value={tier} onChange={e => setTier(e.target.value)}
              >
                <option value="T1">T1 · S&P 500 Core (~503)</option>
                <option value="T2">T2 · S&P 500 + NQ100 + NYSE100 (~650)</option>
                <option value="T3">T3 · Liquid US Equities (~1,500–2,500) ⚠</option>
                <option value="T4">T4 · Full Nasdaq + NYSE (~3,000–5,000) ⚠</option>
              </select>

              {/* Batch size */}
              <select className="ctrl-select" value={batchSz} onChange={e => setBatchSz(e.target.value)} title="Tickers per batch">
                {BATCH_SIZES.map(b => <option key={b.v} value={b.v}>{b.label}</option>)}
              </select>

              <select className={`ctrl-select${fSector !== 'All Sectors' ? ' active' : ''}`} value={fSector} onChange={e => setFSector(e.target.value)}>
                {SECTORS.map(o => <option key={o}>{o}</option>)}
              </select>
              <select className={`ctrl-select${fIndustry !== 'All Industries' ? ' active' : ''}`} value={fIndustry} onChange={e => setFIndustry(e.target.value)}>
                {INDUSTRIES.map(o => <option key={o}>{o}</option>)}
              </select>
              <select className={`ctrl-select${fCrossing !== 'Any' ? ' active' : ''}`} value={fCrossing} onChange={e => setFCrossing(e.target.value)}>
                {CROSSING_OPTS.map(o => <option key={o}>{o}</option>)}
              </select>
              <select className={`ctrl-select${fRvol !== 'Any' ? ' active' : ''}`} value={fRvol} onChange={e => setFRvol(e.target.value)}>
                {RVOL_OPTS.map(o => <option key={o}>{o}</option>)}
              </select>
              <select className={`ctrl-select${fDir !== 'Any Direction' ? ' active' : ''}`} value={fDir} onChange={e => setFDir(e.target.value)}>
                {DIR_OPTS.map(o => <option key={o}>{o}</option>)}
              </select>
              <input className="ctrl-search" placeholder="Search ticker / company…" value={fSearch} onChange={e => setFSearch(e.target.value)} />
              {hasFilters && <button className="ctrl-clear" onClick={clearFilters}>✕ CLEAR</button>}
              <button className={`liquidity-toggle-btn${showLiq ? ' active' : ''}`} onClick={() => setShowLiq(s => !s)}>
                ⚖ LIQUIDITY{activeLiqFilters.length > 0 ? ` (${activeLiqFilters.length})` : ''} {showLiq ? '▲' : '▼'}
              </button>
              <span className="ctrl-count">{displayResults.length} stocks</span>
            </div>

            {/* ── LIQUIDITY PANEL ── */}
            {showLiq && (
              <div className="liquidity-panel">
                <div className="liquidity-panel-inner">
                  <div className="liq-group">
                    <span className="liq-label">Min Price</span>
                    <select className={`liq-select${liqFilters.minPrice !== '2' ? ' active' : ''}`} value={liqFilters.minPrice} onChange={e => setLiqFilters(l => ({ ...l, minPrice: e.target.value }))}>
                      {[['1', '$1'], ['2', '$2 ✓'], ['5', '$5'], ['10', '$10'], ['20', '$20']].map(([v, l]) => <option key={v} value={v}>{l}</option>)}
                    </select>
                  </div>
                  <div className="liq-divider" />
                  <div className="liq-group">
                    <span className="liq-label">Min Avg Vol</span>
                    <select className={`liq-select${liqFilters.minAvgVol !== '250000' ? ' active' : ''}`} value={liqFilters.minAvgVol} onChange={e => setLiqFilters(l => ({ ...l, minAvgVol: e.target.value }))}>
                      {[['100000', '100K'], ['250000', '250K ✓'], ['500000', '500K'], ['1000000', '1M'], ['2000000', '2M']].map(([v, l]) => <option key={v} value={v}>{l}</option>)}
                    </select>
                  </div>
                  <div className="liq-divider" />
                  <div className="liq-group">
                    <span className="liq-label">Min $ Vol</span>
                    <select className={`liq-select${liqFilters.minDollarVol !== '5000000' ? ' active' : ''}`} value={liqFilters.minDollarVol} onChange={e => setLiqFilters(l => ({ ...l, minDollarVol: e.target.value }))}>
                      {[['1000000', '$1M'], ['5000000', '$5M ✓'], ['10000000', '$10M'], ['25000000', '$25M'], ['50000000', '$50M']].map(([v, l]) => <option key={v} value={v}>{l}</option>)}
                    </select>
                  </div>
                  <div className="liq-divider" />
                  <div className="liq-group">
                    <span className="liq-label">Min History</span>
                    <select className={`liq-select${liqFilters.minHistory !== '60' ? ' active' : ''}`} value={liqFilters.minHistory} onChange={e => setLiqFilters(l => ({ ...l, minHistory: e.target.value }))}>
                      {[['30', '30d'], ['60', '60d ✓'], ['90', '90d'], ['120', '120d']].map(([v, l]) => <option key={v} value={v}>{l}</option>)}
                    </select>
                  </div>
                  <div className="liq-divider" />
                  <div className="liq-group">
                    <span className="liq-label">Mkt Cap Tier</span>
                    <select className={`liq-select${liqFilters.marketCapTier !== 'All' ? ' active' : ''}`} value={liqFilters.marketCapTier} onChange={e => setLiqFilters(l => ({ ...l, marketCapTier: e.target.value }))}>
                      {['All', 'Mega', 'Large', 'Mid', 'Small', 'Micro'].map(o => <option key={o}>{o}</option>)}
                    </select>
                  </div>
                  <div className="liq-divider" />
                  <span className={`liq-toggle ${liqFilters.excludeETFs ? 'on' : 'off'}`} onClick={() => setLiqFilters(l => ({ ...l, excludeETFs: !l.excludeETFs }))}>EXCLUDE ETFs</span>
                  <span className={`liq-toggle ${liqFilters.excludeSub2 ? 'on' : 'off'}`} onClick={() => setLiqFilters(l => ({ ...l, excludeSub2: !l.excludeSub2 }))}>EXCLUDE SUB-$2</span>
                  <div className="liq-divider" />
                  {activeLiqFilters.length > 0 && (
                    <div className="liq-filter-chips">
                      <span style={{ fontSize: 9, color: 'var(--text-muted)', marginRight: 4 }}>ACTIVE:</span>
                      {activeLiqFilters.map((f, i) => <span key={i} className="liq-chip">{f}</span>)}
                    </div>
                  )}
                  <button style={{ marginLeft: 'auto', padding: '4px 10px', borderRadius: 4, background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', cursor: 'pointer', fontSize: 10, fontFamily: 'var(--font-mono)' }} onClick={() => setLiqFilters({ ...LIQ_DEFAULTS })}>RESET</button>
                </div>
              </div>
            )}
          </header>

          {/* Demo banner */}
          {demoMode && <div className="demo-banner">⚠ DEMO MODE ACTIVE — All data is randomly generated. NOT real market data. Disable demo mode and enter your Massive Stocks Starter API key for real data.</div>}

          {/* KPI ROW */}
          <div className="kpi-row">
            <KpiCard label="CROSSED ABOVE 50DMA" value={kpiAbove} sub="Bullish crossings today" color="green glow-green" onClick={() => setKpiFilter(f => f === 'above' ? null : 'above')} active={kpiFilter === 'above'} />
            <KpiCard label="CROSSED BELOW 50DMA" value={kpiBelow} sub="Bearish crossings today" color="red glow-red" onClick={() => setKpiFilter(f => f === 'below' ? null : 'below')} active={kpiFilter === 'below'} />
            <KpiCard label="HIGH REL VOLUME" value={kpiHiRvol} sub="Rel volume over 1.5x" color="blue" onClick={() => setKpiFilter(f => f === 'hirvol' ? null : 'hirvol')} active={kpiFilter === 'hirvol'} />
            <KpiCard label="EXTREME REL VOL" value={kpiExtreme} sub="Rel volume over 3x" color="blue-green glow-green" onClick={() => setKpiFilter(f => f === 'extreme' ? null : 'extreme')} active={kpiFilter === 'extreme'} />
            <KpiCard label="TESTING 50DMA" value={kpiTesting} sub="Within 1.5% of 50DMA" color="purple" onClick={() => setKpiFilter(f => f === 'testing' ? null : 'testing')} active={kpiFilter === 'testing'} />
            <KpiCard label="FAILED / REJECTED" value={kpiRejected} sub="Touched 50DMA, failed" color="orange" onClick={() => setKpiFilter(f => f === 'rejected' ? null : 'rejected')} active={kpiFilter === 'rejected'} />
            <KpiCard label="SCAN COVERAGE" value={kpiScanned} sub={kpiTotal ? `of ~${kpiTotal.toLocaleString()} in ${tierInfo.short}` : `${tierInfo.short}`} color={`muted${scanState.isRunning ? ' amber' : ''}`} prog={kpiScanned} total={kpiTotal || kpiScanned || 1} />
            <KpiCard label="UNIVERSE TIER" value={tier} sub={`${tierInfo.short} · ~${tierInfo.estTime}`} color={tier === 'T1' ? 'blue' : tier === 'T2' ? 'blue-green' : tier === 'T3' ? 'purple' : 'red'} />
          </div>

          {/* Scan stats bar */}
          {scanStats && (
            <div className="scan-stats-bar">
              <div className="stat-chip"><span>Data Source:</span><span className="stat-val ok">Massive Stocks Starter API</span></div>
              <div className="stat-chip"><span>Type:</span><span className="stat-val">Real Market Data</span></div>
              <div className="stat-chip"><span>Freshness:</span><span className="stat-val warn">15-MIN DELAYED</span></div>
              <div className="stat-chip"><span>Tier:</span><span className="stat-val info">{tier}</span></div>
              <div className="stat-chip"><span>Scanned:</span><span className="stat-val ok">{scanStats.scanned}</span></div>
              <div className="stat-chip"><span>Failed:</span><span className={`stat-val ${scanStats.failed > 0 ? 'err' : 'ok'}`}>{scanStats.failed}</span></div>
              <div className="stat-chip"><span>Skipped:</span><span className="stat-val warn">{scanStats.skipped}</span></div>
              <div className="stat-chip"><span>Universe:</span><span className="stat-val">{(scanStats.universe || 0).toLocaleString()}</span></div>
              <div className="stat-chip"><span>Last Scan:</span><span className="stat-val">{lastScan}</span></div>
              {activeLiqFilters.length > 0 && (
                <div className="stat-chip">
                  <span>Filters:</span>
                  {activeLiqFilters.map((f, i) => <span key={i} className="liq-chip" style={{ marginLeft: 4 }}>{f}</span>)}
                </div>
              )}
            </div>
          )}

          {/* Diff banner */}
          {diff && (diff.newAbove.length || diff.newBelow.length || diff.highRvol.length || diff.rejections.length || diff.testing.length) && (
            <div className="diff-banner">
              {diff.newAbove.length > 0 && <div className="diff-item"><span className="diff-dot green" /><span className="diff-label">NEW ABOVE:</span><span>{diff.newAbove.slice(0, 10).map(t => <span key={t} className="diff-ticker-chip green">{t}</span>)}</span></div>}
              {diff.newBelow.length > 0 && <div className="diff-item"><span className="diff-dot red" /><span className="diff-label">NEW BELOW:</span><span>{diff.newBelow.slice(0, 10).map(t => <span key={t} className="diff-ticker-chip red">{t}</span>)}</span></div>}
              {diff.highRvol.length > 0 && <div className="diff-item"><span className="diff-dot blue" /><span className="diff-label">HIGH RELVOL:</span><span>{diff.highRvol.slice(0, 8).map(t => <span key={t} className="diff-ticker-chip blue">{t}</span>)}</span></div>}
              {diff.rejections.length > 0 && <div className="diff-item"><span className="diff-dot orange" /><span className="diff-label">REJECTIONS:</span><span>{diff.rejections.slice(0, 6).map(t => <span key={t} className="diff-ticker-chip orange">{t}</span>)}</span></div>}
              {diff.testing.length > 0 && <div className="diff-item"><span className="diff-dot purple" /><span className="diff-label">TESTING:</span><span>{diff.testing.slice(0, 6).map(t => <span key={t} className="diff-ticker-chip" style={{ borderColor: 'rgba(168,85,247,0.3)', color: 'var(--purple)' }}>{t}</span>)}</span></div>}
            </div>
          )}

          {/* TABLE */}
          {results.length === 0 && !scanState.isRunning ? (
            <div className="empty-state">
              <div className="empty-icon">↕</div>
              <div className="empty-title">No Scan Data</div>
              <div className="empty-sub">
                Select a Universe Tier, configure Liquidity Filters, enter your Massive Stocks Starter API key and click SCAN NOW.<br />
                Results stream in real time as each batch completes.<br /><br />
                <span style={{ color: 'var(--blue)', fontSize: 10 }}>Tier 1 (S&P 500 Core) is fastest — ~1–2 min with default settings.</span><br />
                <span style={{ color: 'var(--purple)', fontSize: 10 }}>Enable DEMO MODE to explore the interface without an API key.</span>
              </div>
            </div>
          ) : (
            <div className="table-wrap">
              {scanState.isRunning && results.length > 0 && (
                <div style={{ padding: '6px 0 10px', fontSize: 10, color: 'var(--blue)', display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div className="scan-spinner" style={{ width: 14, height: 14, borderWidth: 2 }} />
                  Streaming results live — {results.length} so far · Batch {scanState.batchIndex}/{scanState.totalBatches}
                </div>
              )}
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <SortTh label="SCORE" sk="signalScore" />
                    <SortTh label="TICKER" sk="ticker" />
                    <th>COMPANY</th>
                    <th>EXCH</th>
                    <SortTh label="SECTOR" sk="sector" />
                    <SortTh label="DIR" sk="direction" />
                    <th>CROSSING STATUS</th>
                    <SortTh label="PRICE" sk="price" />
                    <SortTh label="50DMA" sk="sma50" />
                    <SortTh label="DIST%" sk="distPct" />
                    <th>PREV vs 50DMA</th>
                    <th>CUR vs 50DMA</th>
                    <SortTh label="REL VOL" sk="relVol20" />
                    <SortTh label="VOLUME" sk="volume" />
                    <th>20D AVG</th>
                    <th>50D AVG</th>
                    <th>CLOSE LOC</th>
                    <SortTh label="5D RET" sk="ret5d" />
                    <SortTh label="10D RET" sk="ret10d" />
                    <th>MCT</th>
                    <th>TIME</th>
                  </tr>
                </thead>
                <tbody>
                  {displayResults.map((r, i) => (
                    <tr key={r.ticker + r.timestamp} className={r.isNew ? 'new-alert streaming' : ''} onClick={() => setSelectedStock(r)}>
                      <td className="td-num">{i + 1}</td>
                      <td><ScoreBar score={r.signalScore} /></td>
                      <td className="td-ticker" style={{ color: r.direction === 'Bullish' ? 'var(--green)' : r.direction === 'Bearish' ? 'var(--red)' : 'var(--text)' }}>{r.ticker}</td>
                      <td className="td-company">{r.company}</td>
                      <td><span className="exch-badge">{r.exchange}</span></td>
                      <td style={{ color: 'var(--text-dim)', fontSize: 10, maxWidth: 90, overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.sector}</td>
                      <td><DirTag dir={r.direction} /></td>
                      <td><StatusBadge code={r.status} /></td>
                      <td style={{ fontWeight: 600 }}>{fmtPrice(r.price)}</td>
                      <td style={{ color: 'var(--text-dim)' }}>{fmtPrice(r.sma50)}</td>
                      <td className={r.distPct >= 0 ? 'num-pos' : 'num-neg'}>{fmtPct(r.distPct)}</td>
                      <td className={r.prevCloseVs50 >= 0 ? 'num-pos' : 'num-neg'}>{fmtPct(r.prevCloseVs50)}</td>
                      <td className={r.currentCloseVs50 >= 0 ? 'num-pos' : 'num-neg'}>{fmtPct(r.currentCloseVs50)}</td>
                      <td><RvolCell rv={r.relVol20} /></td>
                      <td style={{ color: 'var(--text-dim)' }}>{fmtVol(r.volume)}</td>
                      <td style={{ color: 'var(--text-muted)' }}>{fmtVol(r.avgVol20)}</td>
                      <td style={{ color: 'var(--text-muted)' }}>{fmtVol(r.avgVol50)}</td>
                      <td style={{ color: 'var(--text-dim)' }}>{r.closeLocation != null ? fmt(r.closeLocation * 100) + '%' : '—'}</td>
                      <td className={r.ret5d >= 0 ? 'num-pos' : 'num-neg'}>{fmtPct(r.ret5d)}</td>
                      <td className={r.ret10d >= 0 ? 'num-pos' : 'num-neg'}>{fmtPct(r.ret10d)}</td>
                      <td style={{ fontSize: 9, color: 'var(--text-muted)' }}>{r.mcTier || '—'}</td>
                      <td style={{ color: 'var(--text-muted)', fontSize: 9 }}>
                        {r.timestamp ? new Date(r.timestamp).toLocaleTimeString() : '—'}
                        {r.demo && <span style={{ color: 'var(--purple)', marginLeft: 4, fontSize: 8 }}>D</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* SCAN DASHBOARD OVERLAY */}
          {scanState.showDash && (
            <ScanDashboard
              state={scanState}
              onPause={handlePause}
              onResume={handleResume}
              onCancel={handleCancel}
              onDone={handleDone}
              onViewPartial={handleDone}
            />
          )}

          {/* TIER 4 CONFIRM */}
          {showT4Confirm && (
            <Tier4Confirm
              batchSize={batchSz}
              onConfirm={() => { setShowT4Confirm(false); setScanState(s => ({ ...s, showDash: true, resumeAvailable: false })); startScan(false); }}
              onCancel={() => setShowT4Confirm(false)}
            />
          )}

          {/* DETAIL MODAL */}
          {selectedStock && <DetailModal stock={selectedStock} onClose={() => setSelectedStock(null)} />}

          {/* TOASTS */}
          <ToastContainer toasts={toasts} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
