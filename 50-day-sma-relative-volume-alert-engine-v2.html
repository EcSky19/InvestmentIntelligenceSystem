<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>50-Day SMA Crossing Engine v2.0 · Tiered Universe · Relative Volume Alert System</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg-base: #06070d;
      --bg-card: #0c0e18;
      --bg-card2: #0f1120;
      --bg-hover: #141729;
      --bg-row: #0a0c16;
      --border: #1c2038;
      --border-bright: #2a2f52;
      --red: #f43f5e;
      --red-dim: #be123c;
      --red-glow: rgba(244, 63, 94, 0.18);
      --amber: #f59e0b;
      --amber-dim: #b45309;
      --amber-glow: rgba(245, 158, 11, 0.15);
      --orange: #fb923c;
      --green: #22c55e;
      --green-dim: #166534;
      --green-glow: rgba(34, 197, 94, 0.18);
      --blue: #3b82f6;
      --blue-glow: rgba(59, 130, 246, 0.18);
      --purple: #a855f7;
      --purple-glow: rgba(168, 85, 247, 0.15);
      --teal: #14b8a6;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-muted: #475569;
      --text-faint: #1e2a3a;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }

    html {
      font-size: 13px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-base);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-base);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-bright);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3a4060;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
    }

    .header-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      gap: 12px;
      flex-wrap: wrap;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--blue), var(--green));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
    }

    .engine-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .engine-sub {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .regime-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      border: 1px solid;
    }

    .regime-bull {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.3);
      color: var(--green);
    }

    .regime-bear {
      background: rgba(244, 63, 94, 0.1);
      border-color: rgba(244, 63, 94, 0.3);
      color: var(--red);
    }

    .regime-neutral {
      background: rgba(168, 85, 247, 0.1);
      border-color: rgba(168, 85, 247, 0.3);
      color: var(--purple);
    }

    .regime-unknown {
      background: rgba(71, 85, 105, 0.15);
      border-color: var(--border);
      color: var(--text-muted);
    }

    .freshness-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: var(--amber);
    }

    .freshness-badge.scanning {
      background: rgba(59, 130, 246, 0.1);
      border-color: rgba(59, 130, 246, 0.3);
      color: var(--blue);
    }

    .freshness-badge.demo {
      background: rgba(168, 85, 247, 0.1);
      border-color: rgba(168, 85, 247, 0.3);
      color: var(--purple);
    }

    .freshness-badge.await {
      background: rgba(71, 85, 105, 0.1);
      border-color: var(--border);
      color: var(--text-muted);
    }

    .scan-btn {
      padding: 6px 16px;
      border-radius: 5px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.15s;
      background: rgba(59, 130, 246, 0.15);
      border-color: rgba(59, 130, 246, 0.4);
      color: var(--blue);
    }

    .scan-btn:hover:not(:disabled) {
      background: rgba(59, 130, 246, 0.25);
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.2);
    }

    .scan-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .scan-btn.scanning {
      color: var(--amber);
      border-color: rgba(245, 158, 11, 0.4);
      background: rgba(245, 158, 11, 0.1);
    }

    .scan-btn.paused {
      color: var(--green);
      border-color: rgba(34, 197, 94, 0.4);
      background: rgba(34, 197, 94, 0.1);
    }

    .icon-btn {
      padding: 6px 12px;
      border-radius: 5px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: 1px solid var(--border-bright);
      background: var(--bg-card2);
      color: var(--text-dim);
      transition: all 0.15s;
    }

    .icon-btn:hover {
      border-color: var(--border-bright);
      color: var(--text);
      background: var(--bg-hover);
    }

    .icon-btn.danger {
      border-color: rgba(244, 63, 94, 0.3);
      color: var(--red);
      background: var(--red-glow);
    }

    .icon-btn.danger:hover {
      background: rgba(244, 63, 94, 0.2);
    }

    .icon-btn.success {
      border-color: rgba(34, 197, 94, 0.3);
      color: var(--green);
      background: rgba(34, 197, 94, 0.08);
    }

    .icon-btn.purple-btn {
      border-color: rgba(168, 85, 247, 0.3);
      color: var(--purple);
      background: rgba(168, 85, 247, 0.08);
    }

    .icon-btn.purple-btn.active {
      background: rgba(168, 85, 247, 0.2);
      box-shadow: 0 0 8px var(--purple-glow);
    }
