<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>50-Day SMA Crossing Engine v2.0 · Tiered Universe · Relative Volume Alert System</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg-base: #06070d;
      --bg-card: #0c0e18;
      --bg-card2: #0f1120;
      --bg-hover: #141729;
      --bg-row: #0a0c16;
      --border: #1c2038;
      --border-bright: #2a2f52;
      --red: #f43f5e;
      --red-dim: #be123c;
      --red-glow: rgba(244, 63, 94, 0.18);
      --amber: #f59e0b;
      --amber-dim: #b45309;
      --amber-glow: rgba(245, 158, 11, 0.15);
      --orange: #fb923c;
      --green: #22c55e;
      --green-dim: #166534;
      --green-glow: rgba(34, 197, 94, 0.18);
      --blue: #3b82f6;
      --blue-glow: rgba(59, 130, 246, 0.18);
      --purple: #a855f7;
      --purple-glow: rgba(168, 85, 247, 0.15);
      --teal: #14b8a6;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-muted: #475569;
      --text-faint: #1e2a3a;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }

    html {
      font-size: 13px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-base);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-base);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-bright);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3a4060;
    }
