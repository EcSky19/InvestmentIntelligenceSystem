<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>50-Day SMA Crossing Engine v2.0 · Tiered Universe · Relative Volume Alert System</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg-base: #06070d;
      --bg-card: #0c0e18;
      --bg-card2: #0f1120;
      --bg-hover: #141729;
      --bg-row: #0a0c16;
      --border: #1c2038;
      --border-bright: #2a2f52;
      --red: #f43f5e;
      --red-dim: #be123c;
      --red-glow: rgba(244, 63, 94, 0.18);
      --amber: #f59e0b;
      --amber-dim: #b45309;
      --amber-glow: rgba(245, 158, 11, 0.15);
      --orange: #fb923c;
      --green: #22c55e;
      --green-dim: #166534;
      --green-glow: rgba(34, 197, 94, 0.18);
      --blue: #3b82f6;
      --blue-glow: rgba(59, 130, 246, 0.18);
      --purple: #a855f7;
      --purple-glow: rgba(168, 85, 247, 0.15);
      --teal: #14b8a6;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-muted: #475569;
      --text-faint: #1e2a3a;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }

    html {
      font-size: 13px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-base);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-base);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-bright);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3a4060;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
    }

    .header-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      gap: 12px;
      flex-wrap: wrap;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--blue), var(--green));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
    }

    .engine-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .engine-sub {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .regime-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      border: 1px solid;
    }

    .regime-bull {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.3);
      color: var(--green);
    }

    .regime-bear {
      background: rgba(244, 63, 94, 0.1);
      border-color: rgba(244, 63, 94, 0.3);
      color: var(--red);
    }

    .regime-neutral {
      background: rgba(168, 85, 247, 0.1);
      border-color: rgba(168, 85, 247, 0.3);
      color: var(--purple);
    }

    .regime-unknown {
      background: rgba(71, 85, 105, 0.15);
      border-color: var(--border);
      color: var(--text-muted);
    }

    .freshness-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: var(--amber);
    }

    .freshness-badge.scanning {
      background: rgba(59, 130, 246, 0.1);
      border-color: rgba(59, 130, 246, 0.3);
      color: var(--blue);
    }

    .freshness-badge.demo {
      background: rgba(168, 85, 247, 0.1);
      border-color: rgba(168, 85, 247, 0.3);
      color: var(--purple);
    }

    .freshness-badge.await {
      background: rgba(71, 85, 105, 0.1);
      border-color: var(--border);
      color: var(--text-muted);
    }

    .scan-btn {
      padding: 6px 16px;
      border-radius: 5px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.15s;
      background: rgba(59, 130, 246, 0.15);
      border-color: rgba(59, 130, 246, 0.4);
      color: var(--blue);
    }

    .scan-btn:hover:not(:disabled) {
      background: rgba(59, 130, 246, 0.25);
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.2);
    }

    .scan-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .scan-btn.scanning {
      color: var(--amber);
      border-color: rgba(245, 158, 11, 0.4);
      background: rgba(245, 158, 11, 0.1);
    }

    .scan-btn.paused {
      color: var(--green);
      border-color: rgba(34, 197, 94, 0.4);
      background: rgba(34, 197, 94, 0.1);
    }

    .icon-btn {
      padding: 6px 12px;
      border-radius: 5px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: 1px solid var(--border-bright);
      background: var(--bg-card2);
      color: var(--text-dim);
      transition: all 0.15s;
    }

    .icon-btn:hover {
      border-color: var(--border-bright);
      color: var(--text);
      background: var(--bg-hover);
    }

    .icon-btn.danger {
      border-color: rgba(244, 63, 94, 0.3);
      color: var(--red);
      background: var(--red-glow);
    }

    .icon-btn.danger:hover {
      background: rgba(244, 63, 94, 0.2);
    }

    .icon-btn.success {
      border-color: rgba(34, 197, 94, 0.3);
      color: var(--green);
      background: rgba(34, 197, 94, 0.08);
    }

    .icon-btn.purple-btn {
      border-color: rgba(168, 85, 247, 0.3);
      color: var(--purple);
      background: rgba(168, 85, 247, 0.08);
    }

    .icon-btn.purple-btn.active {
      background: rgba(168, 85, 247, 0.2);
      box-shadow: 0 0 8px var(--purple-glow);
    }

    /* ── INLINE KEY FORM ── */
    .inline-key-form {
      border-top: 1px solid var(--border);
      padding: 8px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .inline-key-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .inline-key-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .inline-key-input {
      flex: 1;
      min-width: 200px;
      padding: 5px 10px;
      border-radius: 4px;
      background: var(--bg-base);
      border: 1px solid var(--border-bright);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      outline: none;
    }

    .inline-key-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
    }

    .inline-key-input::placeholder {
      color: var(--text-muted);
    }

    .inline-key-save {
      padding: 5px 12px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.35);
      color: var(--green);
      transition: all 0.15s;
    }

    .inline-key-save:hover {
      background: rgba(34, 197, 94, 0.25);
    }

    .inline-key-clear {
      padding: 5px 12px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      background: var(--red-glow);
      border: 1px solid rgba(244, 63, 94, 0.3);
      color: var(--red);
      transition: all 0.15s;
    }

    .inline-key-clear:hover {
      background: rgba(244, 63, 94, 0.25);
    }

    .key-status {
      font-size: 10px;
    }

    .key-status.ok {
      color: var(--green);
    }

    .key-status.missing {
      color: var(--text-muted);
    }

    /* ── CONTROLS ROW ── */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 0;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .ctrl-select {
      padding: 5px 8px;
      border-radius: 4px;
      background: var(--bg-base);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }

    .ctrl-select:hover,
    .ctrl-select:focus {
      border-color: var(--border-bright);
      color: var(--text);
    }

    .ctrl-select.active {
      border-color: var(--blue);
      color: var(--blue);
    }

    .ctrl-select.tier-select {
      font-weight: 700;
      border-color: rgba(59, 130, 246, 0.4);
      color: var(--blue);
      min-width: 200px;
    }

    .ctrl-select.tier-select.t3 {
      border-color: rgba(168, 85, 247, 0.4);
      color: var(--purple);
    }

    .ctrl-select.tier-select.t4 {
      border-color: rgba(244, 63, 94, 0.4);
      color: var(--red);
    }

    .ctrl-search {
      padding: 5px 10px;
      border-radius: 4px;
      background: var(--bg-base);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      outline: none;
      width: 150px;
      transition: border-color 0.15s;
    }

    .ctrl-search:focus {
      border-color: var(--blue);
    }

    .ctrl-search::placeholder {
      color: var(--text-muted);
    }

    .ctrl-clear {
      padding: 5px 10px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      background: rgba(244, 63, 94, 0.08);
      border: 1px solid rgba(244, 63, 94, 0.2);
      color: var(--red);
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }

    .ctrl-clear:hover {
      background: rgba(244, 63, 94, 0.15);
    }

    .ctrl-count {
      margin-left: auto;
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      padding: 0 4px;
    }

    .liquidity-toggle-btn {
      padding: 5px 10px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      background: var(--bg-card2);
      border: 1px solid var(--border-bright);
      color: var(--text-muted);
      letter-spacing: 0.04em;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .liquidity-toggle-btn:hover {
      color: var(--text);
      border-color: var(--amber);
    }

    .liquidity-toggle-btn.active {
      border-color: rgba(245, 158, 11, 0.4);
      color: var(--amber);
      background: rgba(245, 158, 11, 0.08);
    }

    /* ── LIQUIDITY FILTER PANEL ── */
    .liquidity-panel {
      border-top: 1px solid var(--border);
      padding: 8px 0;
      background: var(--bg-card2);
    }

    .liquidity-panel-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .liq-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .liq-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .liq-select {
      padding: 4px 7px;
      border-radius: 4px;
      background: var(--bg-base);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 10px;
      cursor: pointer;
      outline: none;
    }

    .liq-select:hover,
    .liq-select:focus {
      border-color: var(--border-bright);
      color: var(--text);
    }

    .liq-select.active {
      border-color: rgba(245, 158, 11, 0.4);
      color: var(--amber);
    }

    .liq-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      background: var(--bg-base);
      border: 1px solid var(--border);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      transition: all 0.15s;
      user-select: none;
    }

    .liq-toggle.on {
      border-color: rgba(34, 197, 94, 0.3);
      color: var(--green);
      background: rgba(34, 197, 94, 0.08);
    }

    .liq-toggle.on::before {
      content: '✓ ';
    }

    .liq-toggle.off {
      border-color: var(--border);
      color: var(--text-muted);
    }

    .liq-toggle.off::before {
      content: '✕ ';
      color: var(--red);
    }

    .liq-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    .liq-filter-chips {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      font-size: 9px;
    }

    .liq-chip {
      padding: 2px 7px;
      border-radius: 3px;
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.25);
      color: var(--amber);
      font-size: 9px;
      font-weight: 600;
    }

    /* ── TIER BADGE ── */
    .tier-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      border: 1px solid;
    }

    .tier-1 {
      background: rgba(59, 130, 246, 0.1);
      border-color: rgba(59, 130, 246, 0.3);
      color: var(--blue);
    }

    .tier-2 {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.3);
      color: var(--green);
    }

    .tier-3 {
      background: rgba(168, 85, 247, 0.1);
      border-color: rgba(168, 85, 247, 0.3);
      color: var(--purple);
    }

    .tier-4 {
      background: rgba(244, 63, 94, 0.1);
      border-color: rgba(244, 63, 94, 0.3);
      color: var(--red);
    }

    /* ── KPI ROW ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg-base);
      border-bottom: 1px solid var(--border);
    }

    @media (max-width: 1200px) {
      .kpi-row {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 700px) {
      .kpi-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .kpi-card:hover {
      border-color: var(--border-bright);
      background: var(--bg-hover);
    }

    .kpi-card.active {
      border-color: currentColor;
    }

    .kpi-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .kpi-value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 3px;
    }

    .kpi-sub {
      font-size: 9px;
      color: var(--text-muted);
    }

    .kpi-prog {
      margin-top: 5px;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    .kpi-prog-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.4s;
    }

    .kpi-card.green .kpi-value {
      color: var(--green);
    }

    .kpi-card.red .kpi-value {
      color: var(--red);
    }

    .kpi-card.blue .kpi-value {
      color: var(--blue);
    }

    .kpi-card.blue-green .kpi-value {
      color: var(--teal);
    }

    .kpi-card.purple .kpi-value {
      color: var(--purple);
    }

    .kpi-card.orange .kpi-value {
      color: var(--orange);
    }

    .kpi-card.muted .kpi-value {
      color: var(--text-dim);
    }

    .kpi-card.amber .kpi-value {
      color: var(--amber);
    }

    .kpi-card.glow-green {
      box-shadow: inset 0 0 20px rgba(34, 197, 94, 0.05);
    }

    .kpi-card.glow-red {
      box-shadow: inset 0 0 20px rgba(244, 63, 94, 0.05);
    }

    /* ── DIFF BANNER ── */
    .diff-banner {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 6px 16px;
      background: var(--bg-card2);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      white-space: nowrap;
      font-size: 10px;
    }

    .diff-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .diff-label {
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.06em;
    }

    .diff-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .diff-dot.green {
      background: var(--green);
    }

    .diff-dot.red {
      background: var(--red);
    }

    .diff-dot.blue {
      background: var(--blue);
    }

    .diff-dot.orange {
      background: var(--orange);
    }

    .diff-dot.purple {
      background: var(--purple);
    }

    .diff-ticker-chip {
      display: inline-block;
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      margin: 0 2px;
      font-size: 9px;
      font-weight: 600;
    }

    .diff-ticker-chip.green {
      border-color: rgba(34, 197, 94, 0.3);
      color: var(--green);
    }

    .diff-ticker-chip.red {
      border-color: rgba(244, 63, 94, 0.3);
      color: var(--red);
    }

    .diff-ticker-chip.blue {
      border-color: rgba(59, 130, 246, 0.3);
      color: var(--blue);
    }

    .diff-ticker-chip.purple {
      border-color: rgba(168, 85, 247, 0.3);
      color: var(--purple);
    }

    .diff-ticker-chip.orange {
      border-color: rgba(251, 146, 60, 0.3);
      color: var(--orange);
    }

    /* ── SCAN STATS BAR ── */
    .scan-stats-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 5px 16px;
      background: var(--bg-card2);
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-val {
      font-weight: 600;
    }

    .stat-val.ok {
      color: var(--green);
    }

    .stat-val.warn {
      color: var(--amber);
    }

    .stat-val.err {
      color: var(--red);
    }

    .stat-val.info {
      color: var(--blue);
    }

    /* ── LIVE SCAN DASHBOARD ── */
    .scan-dashboard {
      position: fixed;
      inset: 0;
      background: rgba(6, 7, 13, 0.96);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 24px 24px;
      overflow-y: auto;
    }

    .scan-dash-inner {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .scan-dash-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text);
      text-align: center;
    }

    .scan-dash-tier {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .scan-progress-track {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .scan-progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width 0.4s ease;
    }

    .scan-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .scan-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .scan-stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      text-align: center;
    }

    .scan-stat-card .s-label {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .scan-stat-card .s-val {
      font-size: 20px;
      font-weight: 700;
    }

    .scan-stat-card.ok .s-val {
      color: var(--green);
    }

    .scan-stat-card.warn .s-val {
      color: var(--amber);
    }

    .scan-stat-card.err .s-val {
      color: var(--red);
    }

    .scan-stat-card.info .s-val {
      color: var(--blue);
    }

    .scan-current-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 11px;
    }

    .scan-current-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
    }

    .scan-current-label {
      color: var(--text-muted);
      font-size: 10px;
    }

    .scan-current-val {
      color: var(--text);
      font-weight: 600;
    }

    .scan-latest-alert {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 12px;
      font-size: 10px;
    }

    .scan-latest-label {
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
    }

    .scan-btn-row {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .scan-action-btn {
      padding: 8px 24px;
      border-radius: 5px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.15s;
      min-width: 120px;
    }

    .scan-action-btn.pause {
      background: rgba(245, 158, 11, 0.1);
      border-color: rgba(245, 158, 11, 0.4);
      color: var(--amber);
    }

    .scan-action-btn.pause:hover {
      background: rgba(245, 158, 11, 0.2);
    }

    .scan-action-btn.resume {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.4);
      color: var(--green);
    }

    .scan-action-btn.resume:hover {
      background: rgba(34, 197, 94, 0.2);
    }

    .scan-action-btn.cancel {
      background: var(--red-glow);
      border-color: rgba(244, 63, 94, 0.3);
      color: var(--red);
    }

    .scan-action-btn.cancel:hover {
      background: rgba(244, 63, 94, 0.2);
    }

    .scan-action-btn.done {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.4);
      color: var(--green);
    }

    .scan-action-btn.done:hover {
      background: rgba(34, 197, 94, 0.2);
    }

    .scan-note {
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
    }

    .scan-note.warn {
      color: var(--amber);
    }

    .scan-resume-banner {
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 6px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .scan-resume-text {
      font-size: 11px;
      color: var(--text-dim);
    }

    .scan-resume-text strong {
      color: var(--blue);
    }

    .scan-resume-btns {
      display: flex;
      gap: 8px;
    }

    .scan-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── CONFIRM DIALOG ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 7, 13, 0.9);
      z-index: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .confirm-box {
      background: var(--bg-card);
      border: 1px solid var(--border-bright);
      border-radius: 8px;
      padding: 24px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
    }

    .confirm-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--red);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .confirm-body {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-sans);
      line-height: 1.8;
      margin-bottom: 16px;
    }

    .confirm-stats {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 16px;
      font-size: 10px;
      margin-bottom: 16px;
      background: var(--bg-card2);
      border-radius: 5px;
      padding: 10px 12px;
      border: 1px solid var(--border);
    }

    .confirm-stat-label {
      color: var(--text-muted);
    }

    .confirm-stat-val {
      color: var(--text);
      font-weight: 600;
    }

    .confirm-recs {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.8;
      font-family: var(--font-sans);
    }

    .confirm-recs li {
      margin-left: 16px;
    }

    .confirm-btns {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .confirm-btn {
      padding: 7px 20px;
      border-radius: 5px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.15s;
    }

    .confirm-btn.cancel {
      background: var(--bg-card2);
      border-color: var(--border-bright);
      color: var(--text-muted);
    }

    .confirm-btn.cancel:hover {
      color: var(--text);
    }

    .confirm-btn.confirm {
      background: var(--red-glow);
      border-color: rgba(244, 63, 94, 0.4);
      color: var(--red);
    }

    .confirm-btn.confirm:hover {
      background: rgba(244, 63, 94, 0.2);
    }

    /* ── TABLE ── */
    .table-wrap {
      overflow-x: auto;
      padding: 12px 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    thead th {
      padding: 6px 8px;
      text-align: left;
      color: var(--text-muted);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      position: sticky;
      top: 0;
      transition: color 0.15s;
    }

    thead th:hover {
      color: var(--text-dim);
    }

    thead th.sort-active {
      color: var(--blue);
    }

    .sort-icon {
      font-size: 8px;
      margin-left: 4px;
      opacity: 0.5;
    }

    .sort-icon.active {
      opacity: 1;
    }

    tbody tr {
      background: var(--bg-row);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    tbody tr:hover {
      background: var(--bg-hover);
    }

    tbody tr.new-alert {
      animation: flashNew 2s ease-out;
    }

    @keyframes flashNew {
      0% {
        background: rgba(59, 130, 246, 0.12);
      }

      100% {
        background: var(--bg-row);
      }
    }

    tbody tr.streaming {
      animation: flashNew 1s ease-out;
    }

    td {
      padding: 6px 8px;
      white-space: nowrap;
      vertical-align: middle;
    }

    .td-num {
      color: var(--text-muted);
      font-size: 10px;
      text-align: right;
    }

    .td-ticker {
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .td-company {
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-dim);
      font-family: var(--font-sans);
    }

    /* ── SCORE BAR ── */
    .score-bar {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .score-val {
      font-weight: 700;
      font-size: 12px;
      width: 26px;
      text-align: right;
    }

    .score-track {
      width: 50px;
      height: 5px;
      background: var(--bg-hover);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }

    /* ── STATUS BADGES ── */
    .stage-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      white-space: nowrap;
      border: 1px solid;
    }

    .status-cross-above,
    .status-reclaimed,
    .status-first-above {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.3);
      color: var(--green);
    }

    .status-hold-above {
      background: rgba(34, 197, 94, 0.06);
      border-color: rgba(34, 197, 94, 0.2);
      color: #16a34a;
    }

    .status-cross-below,
    .status-lost,
    .status-first-below {
      background: rgba(244, 63, 94, 0.1);
      border-color: rgba(244, 63, 94, 0.3);
      color: var(--red);
    }

    .status-hold-below {
      background: rgba(244, 63, 94, 0.06);
      border-color: rgba(244, 63, 94, 0.2);
      color: #be123c;
    }

    .status-rejected {
      background: rgba(251, 146, 60, 0.1);
      border-color: rgba(251, 146, 60, 0.3);
      color: var(--orange);
    }

    .status-test-below {
      background: rgba(168, 85, 247, 0.1);
      border-color: rgba(168, 85, 247, 0.3);
      color: var(--purple);
    }

    .status-test-above {
      background: rgba(245, 158, 11, 0.1);
      border-color: rgba(245, 158, 11, 0.3);
      color: var(--amber);
    }

    .status-na {
      background: rgba(71, 85, 105, 0.1);
      border-color: var(--border);
      color: var(--text-muted);
    }

    /* ── DIRECTION TAG ── */
    .dir-tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .dir-bull {
      background: rgba(34, 197, 94, 0.1);
      color: var(--green);
    }

    .dir-bear {
      background: rgba(244, 63, 94, 0.1);
      color: var(--red);
    }

    .dir-neut {
      background: rgba(168, 85, 247, 0.1);
      color: var(--purple);
    }

    /* ── RVOL ── */
    .rvol-val {
      font-weight: 600;
    }

    .rvol-extreme {
      color: var(--green);
      text-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
    }

    .rvol-very-high {
      color: #4ade80;
    }

    .rvol-high {
      color: var(--teal);
    }

    .rvol-elevated {
      color: var(--blue);
    }

    .rvol-normal {
      color: var(--text-dim);
    }

    .rvol-low {
      color: var(--text-muted);
    }

    .rvol-very-low {
      color: var(--text-faint);
    }

    /* ── NUMBER COLORS ── */
    .num-pos {
      color: var(--green);
    }

    .num-neg {
      color: var(--red);
    }

    .num-warn {
      color: var(--amber);
    }

    .num-neu {
      color: var(--text-dim);
    }

    /* ── EXCHANGE BADGE ── */
    .exch-badge {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 600;
      background: var(--bg-hover);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 7, 13, 0.88);
      z-index: 500;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-bright);
      border-radius: 8px;
      width: 100%;
      max-width: 820px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      animation: modalIn 0.2s ease;
      margin: auto;
    }

    .modal-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-header-left {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .modal-ticker-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-ticker {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .modal-company {
      font-size: 12px;
      color: var(--text-dim);
      font-family: var(--font-sans);
    }

    .modal-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 10px;
      color: var(--text-muted);
    }

    .modal-close {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 10px;
      font-size: 12px;
      font-family: var(--font-mono);
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .modal-close:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .modal-body {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-section-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .entry-map {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    @media (max-width: 600px) {
      .entry-map {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .map-item {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 10px;
    }

    .map-item-label {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .map-item-val {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .map-item-note {
      font-size: 9px;
      color: var(--text-muted);
    }

    .levels-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    @media (max-width: 600px) {
      .levels-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .level-item {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 10px;
    }

    .level-label {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .level-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .level-note {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .game-plan-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 500px) {
      .game-plan-grid {
        grid-template-columns: 1fr;
      }
    }

    .game-plan {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
    }

    .game-plan-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .game-plan-body {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.7;
      font-family: var(--font-sans);
    }

    .signals-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 500px) {
      .signals-grid {
        grid-template-columns: 1fr;
      }
    }

    .signal-list {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
    }

    .signal-list-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .signal-list-title.pos {
      color: var(--green);
    }

    .signal-list-title.neg {
      color: var(--red);
    }

    .signal-item {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 4px 0;
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--font-sans);
      border-top: 1px solid var(--border);
    }

    .signal-item:first-of-type {
      border-top: none;
    }

    .signal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .signal-dot.green {
      background: var(--green);
    }

    .signal-dot.red {
      background: var(--red);
    }

    .signal-dot.amber {
      background: var(--amber);
    }

    .signal-dot.blue {
      background: var(--blue);
    }

    .signal-dot.gray {
      background: var(--text-muted);
    }

    .module-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    @media (max-width: 600px) {
      .module-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .module-card {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 10px 12px;
    }

    .module-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .module-name {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .module-score {
      font-size: 13px;
      font-weight: 700;
    }

    .module-bar {
      width: 100%;
      height: 4px;
      background: var(--bg-hover);
      border-radius: 2px;
      margin-bottom: 5px;
      overflow: hidden;
    }

    .module-fill {
      height: 100%;
      border-radius: 2px;
    }

    .module-detail {
      font-size: 9px;
      color: var(--text-muted);
      line-height: 1.5;
      font-family: var(--font-sans);
    }

    .bottom-strip {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
    }

    }

    }

      border-radius: 6px;
      padding: 12px 14px;
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-sans);
      line-height: 1.75;
    }

      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .empty-sub {
      font-size: 12px;
      line-height: 1.8;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── DEMO BANNER ── */
    .demo-banner {
      background: rgba(168, 85, 247, 0.12);
      border-bottom: 1px solid rgba(168, 85, 247, 0.3);
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--purple);
    }

    /* ── TOAST ── */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border-bright);
      border-radius: 6px;
      padding: 10px 14px;
      min-width: 240px;
      max-width: 360px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      animation: slideIn 0.25s ease;
      pointer-events: all;
    }

    @keyframes slideIn {
      from {
        transform: translateX(20px);
        opacity: 0;
      }
    }

    .toast-title {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .toast-msg {
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .toast.error .toast-title {
      color: var(--red);
    }

    .toast.warn .toast-title {
      color: var(--amber);
    }

    .toast.success .toast-title {
      color: var(--green);
    }

    .toast.info .toast-title {
      color: var(--blue);
    }

    /* ─────────────── API ─────────────── */
    async function apiFetch(url, apiKey) {
      const sep = url.includes('?') ? '&' : '?';
      const resp = await fetch(`${url}${sep}apiKey=${apiKey}`);
      if (resp.status === 403) throw Object.assign(new Error('Invalid API key'), { code: 'AUTH' });
      if (resp.status === 429) throw Object.assign(new Error('Rate limit exceeded'), { code: 'RATE' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }

    /* Fetch reference tickers page by page for T3/T4 — with fixed params and empty-check */
    async function fetchTickerPage(cursor, apiKey) {
      // Use market=stocks only; do NOT pass exchange as comma-separated (not supported)
      // type=CS filters to Common Stock on supported plan tiers
      const params = new URLSearchParams({
        market: 'stocks',
        active: 'true',
        type: 'CS',

      });
      if (cursor) params.set('cursor', cursor);
      const url = `${API_BASE}/v3/reference/tickers?${params}`;
      const data = await apiFetch(url, apiKey);
      return {
        results: data.results || [],
        nextCursor: data.next_url
          ? (new URL(data.next_url).searchParams.get('cursor') || null)
          : null
      };
    }

    async function fetchFullUniverse(apiKey, onProgress) {
      let allTickers = [];
      let cursor = null;
      let page = 0;
      let consecutiveEmpty = 0;
      do {
        onProgress(`Fetching ticker reference page ${page + 1}…`);
        try {
          const { results, nextCursor } = await fetchTickerPage(cursor, apiKey);
          if (results.length === 0) {
            consecutiveEmpty++;
            if (consecutiveEmpty >= 2) break; // stop if API keeps returning empty
          } else {
            consecutiveEmpty = 0;
          }
          allTickers = [...allTickers, ...results];
          cursor = nextCursor;
          page++;
          await sleep(350);
        } catch (e) {
          if (e.code === 'AUTH') throw e;
          // Any other error: stop pagination and return what we have
          break;
        }
      } while (cursor && page < 12);

      const tickers = allTickers.map(r => r.ticker).filter(Boolean);
      // Guard: if API returned nothing useful, throw so caller falls back to curated list
      if (tickers.length < 100) {
        throw new Error(`API returned only ${tickers.length} tickers — falling back to curated list`);
      }
      return tickers;
    }

    /* ─────────────── CALCULATIONS ─────────────── */
    const computeSMA = (closes, period) => {
      if (!closes || closes.length < period) return null;
      const sl = closes.slice(-period);
      return sl.reduce((a, b) => a + b, 0) / period;
    };
    const computeAvgVol = (vols, period) => {
      if (!vols || vols.length < period) return null;
      const sl = vols.slice(-period);
      return sl.reduce((a, b) => a + b, 0) / period;
    };
    const computeRelVol = (cur, avg) => (!avg || avg === 0 || !cur) ? null : cur / avg;
    const computeCloseLocation = (o, h, l, c) => h === l ? 0.5 : (c - l) / (h - l);

    function computeDaysOnSide(bars, smaValues, side) {
      // side: 'below' or 'above' — count consecutive days from bar before last
      let count = 0;
      for (let i = bars.length - 2; i >= 0; i--) {
        const sma = smaValues[i];
        if (!sma) break;
        const cond = side === 'below' ? bars[i].c < sma : bars[i].c > sma;
        if (cond) count++;
        else break;
      }
      return count;
    }

    function classify50DMA(bars, smaValues) {
      if (!bars || bars.length < 3 || !smaValues || smaValues.length < 2) return 'NA';
      const n = bars.length;
      const latest = bars[n - 1], prev = bars[n - 2];
      const smaNow = smaValues[n - 1], smaPrev = smaValues[n - 2];
      if (!smaNow || !smaPrev) return 'NA';
      const cc = latest.c, pc = prev.c, ch = latest.h;

      if (pc <= smaPrev && cc > smaNow) {
        const days = computeDaysOnSide(bars, smaValues, 'below');
        return days >= 5 ? 'RC' : days >= 1 ? 'FA' : 'CA';
      }
      if (pc >= smaPrev && cc < smaNow) {
        const days = computeDaysOnSide(bars, smaValues, 'above');
        return days >= 5 ? 'LS' : days >= 1 ? 'FB' : 'CB';
      }
      if (cc < smaNow) {
        if (ch >= smaNow * 0.998) return 'RJ';
        const highDist = (ch - smaNow) / smaNow * 100;
        if (highDist >= -1.5 && highDist < 0) return 'TB';
        return 'HB';
      }
      if (cc > smaNow) {
        const lowDist = (latest.l - smaNow) / smaNow * 100;
        if (lowDist <= 1.5 && lowDist > 0) return 'TA';
        return 'HA';
      }
      return 'NA';
    }

    /* ─────────────── SIGNAL SCORING ─────────────── */
    function scoreCQ(status, distPct, closeLocation, days) {
      const base = { CA: 75, CB: 75, FA: 82, FB: 82, RC: 88, LS: 88, RJ: 55, TB: 38, TA: 38, HA: 28, HB: 28, NA: 10 }[status] || 10;
      let s = base;
      if (['FA', 'FB', 'RC', 'LS'].includes(status)) s += Math.min(10, (days || 0) * 0.5);
      if (Math.abs(distPct || 0) > 3) s += 5; else if (Math.abs(distPct || 0) > 1.5) s += 3;
      const bull = ['CA', 'FA', 'RC', 'HA', 'TA'].includes(status);
      const bear = ['CB', 'FB', 'LS', 'HB', 'TB', 'RJ'].includes(status);
      if (bull && closeLocation > 0.7) s += 5;
      if (bear && closeLocation < 0.3) s += 5;
      return Math.min(100, Math.max(0, Math.round(s)));
    }
    function scoreRV(rv) {
      if (!rv) return 10;
      if (rv >= 10) return 100; if (rv >= 5) return 92; if (rv >= 3) return 82;
      if (rv >= 2) return 70; if (rv >= 1.5) return 60; if (rv >= 1.0) return 50;
      if (rv >= 0.75) return 38; if (rv >= 0.5) return 26; if (rv >= 0.25) return 16;
      return 8;
    }
    function scoreCL(loc, status) {
      if (loc == null) return 50;
      const bull = ['CA', 'FA', 'RC', 'HA'].includes(status);
      const bear = ['CB', 'FB', 'LS', 'HB', 'RJ'].includes(status);
      if (bull) return Math.round(loc * 100);
      if (bear) return Math.round((1 - loc) * 100);
      return 50;
    }
    function scoreDD(distPct, status) {
      const abs = Math.abs(distPct || 0);
      if (['TB', 'TA'].includes(status)) return abs < 0.5 ? 90 : abs < 1.0 ? 75 : abs < 1.5 ? 60 : 30;
      if (['CA', 'CB', 'FA', 'FB', 'RC', 'LS'].includes(status)) {
        if (abs > 5) return 80; if (abs > 3) return 65; if (abs > 1.5) return 55; if (abs > 0.5) return 45; return 35;
      }
      return 50;
    }
    function scorePC(days, status) {
      if (!days) return 40;
      if (['CA', 'CB', 'FA', 'FB', 'RC', 'LS'].includes(status)) {
        if (days >= 20) return 90; if (days >= 10) return 75; if (days >= 5) return 60; if (days >= 2) return 50; return 35;
      }
      return 45;
    }
    function computeSignalScore(status, distPct, relVol, closeLocation, daysOnPrevSide) {
      const cq = scoreCQ(status, distPct, closeLocation, daysOnPrevSide);
      const rv = scoreRV(relVol);
      const cl = scoreCL(closeLocation, status);
      const dd = scoreDD(distPct, status);
      const pc = scorePC(daysOnPrevSide, status);
      const total = Math.round(Math.min(100, Math.max(0, cq * 0.45 + rv * 0.35 + cl * 0.10 + dd * 0.05 + pc * 0.05)));
      return { total, crossingQuality: cq, relVolScore: rv, closeLocScore: cl, distScore: dd, priorContextScore: pc };
    }

    /* ─────────────── LIQUIDITY CHECK ─────────────── */
    function passesLiquidity(ticker, price, avgVol20, liqFilters) {
      const minP = parseFloat(liqFilters.minPrice) || 2;
      const minV = parseFloat(liqFilters.minAvgVol) || 250000;
      const minD = parseFloat(liqFilters.minDollarVol) || 5000000;
      if (price < minP) return false;
      if (!avgVol20 || avgVol20 < minV) return false;
      if (avgVol20 * price < minD) return false;
      return true;
    }

    /* ─────────────── MARKET CAP TIER ─────────────── */
    function marketCapTier(price, avgVol20) {
      const dollarVol = price * (avgVol20 || 0);
      if (dollarVol > 500e6) return 'Mega';
      if (dollarVol > 100e6) return 'Large';
      if (dollarVol > 25e6) return 'Mid';
      if (dollarVol > 5e6) return 'Small';
      return 'Micro';
    }

    /* ─────────────── REGIME ─────────────── */
    function computeRegime(results) {
      if (!results || results.length === 0) return { label: 'Unknown', pctAbove: null, aboveCrosses: 0, belowCrosses: 0 };
      const valid = results.filter(r => r.status !== 'NA' && r.sma50 != null);
      if (valid.length === 0) return { label: 'Unknown', pctAbove: null, aboveCrosses: 0, belowCrosses: 0 };
      const above = valid.filter(r => r.currentClose > r.sma50).length;
      const pctAbove = above / valid.length * 100;
      const aboveCrosses = results.filter(r => ['CA', 'FA', 'RC'].includes(r.status)).length;
      const belowCrosses = results.filter(r => ['CB', 'FB', 'LS'].includes(r.status)).length;
      const hvA = results.filter(r => ['CA', 'FA', 'RC'].includes(r.status) && (r.relVol20 || 0) > 1.5).length;
      const hvB = results.filter(r => ['CB', 'FB', 'LS'].includes(r.status) && (r.relVol20 || 0) > 1.5).length;
      let label;
      if (pctAbove >= 55 && aboveCrosses >= belowCrosses && hvA >= hvB) label = 'Bullish';
      else if (pctAbove <= 45 && belowCrosses > aboveCrosses) label = 'Bearish';
      else label = 'Neutral';
      return { label, pctAbove, aboveCrosses, belowCrosses };
    }

    /* ─────────────── FILTERS ─────────────── */
    function rvolFilterPass(rv, opt) {
      if (opt === 'Any' || !rv) return true;
      if (opt.startsWith('Relative Volume Under')) return rv < parseFloat(opt.split('Under ')[1]);
      if (opt.startsWith('Relative Volume Over')) return rv > parseFloat(opt.split('Over ')[1]);
      return true;
    }

    /* ─────────────── EXPLANATION ─────────────── */
    function generateExplanation(r) {
      const { ticker: t, status: s, relVol20: rv, distPct: dp, direction: dir, daysOnPrevSide: d } = r;
      const dist = fmt(Math.abs(dp || 0));
      const rvStr = fmtRvol(rv);
      if (['CA', 'FA', 'RC'].includes(s)) {
        const w = s === 'RC' ? 'reclaimed' : s === 'FA' ? 'had its first close above' : 'crossed above';
        return `${t} ${w} its 50-day SMA. The latest close is ${dist}% above the 50DMA, and relative volume is ${rvStr} the 20-day average.${d > 5 ? ` The stock spent ${d} days below the 50DMA before this event.` : ''} Bullish continuation depends on price holding above the 50DMA with sustained volume.`;
      }
      if (['CB', 'FB', 'LS'].includes(s)) {
        const w = s === 'LS' ? 'lost' : s === 'FB' ? 'had its first close below' : 'crossed below';
        return `${t} ${w} its 50-day SMA. The latest close is ${dist}% below the 50DMA, and relative volume is ${rvStr} the 20-day average.${d > 5 ? ` The stock spent ${d} days above the 50DMA before this event.` : ''} Continued weakness likely if price holds below the 50DMA.`;
      }
      if (s === 'TB') return `${t} is testing its 50-day SMA from below. Price is within ${dist}% of the 50DMA but has not closed above it. Relative volume is ${rvStr}. Watchlist alert — not a confirmed crossing.`;
      if (s === 'TA') return `${t} is testing its 50-day SMA from above. Intraday low came close to the 50DMA (${dist}% distance) but held. Relative volume is ${rvStr}. Watch for a potential breakdown.`;
      if (s === 'RJ') return `${t} was rejected at its 50-day SMA. Intraday high touched the SMA but close was below it. Bearish rejection. Relative volume is ${rvStr}.`;
      if (s === 'HA') return `${t} is holding above its 50-day SMA. No fresh crossing event today. Relative volume is ${rvStr}. Price is ${dist}% above the 50DMA.`;
      if (s === 'HB') return `${t} is holding below its 50-day SMA. No fresh crossing event today. Relative volume is ${rvStr}. Price is ${dist}% below the 50DMA.`;
      return `${t} shows no active 50DMA signal. Distance from 50DMA is ${dist}%. Relative volume is ${rvStr}.`;
    }

    /* ─────────────── SCAN SINGLE TICKER ─────────────── */
    async function scanTicker(ticker, apiKey, liqFilters, fromDate, toDate) {
      const bars = await fetchBars(ticker, fromDate, toDate, apiKey);
      const minHistory = parseInt(liqFilters.minHistory) || 60;
      if (!bars || bars.length < minHistory) return null;

      const closes = bars.map(b => b.c);
      const vols = bars.map(b => b.v);
      const latestPrice = closes[closes.length - 1];

      const avgVol20 = computeAvgVol(vols, 20);
      if (!passesLiquidity(ticker, latestPrice, avgVol20, liqFilters)) return null;

      const smaValues = bars.map((_, idx) => idx < 49 ? null : computeSMA(closes.slice(0, idx + 1), 50));
      const sma50 = smaValues[smaValues.length - 1];
      if (!sma50) return null;

      const latest = bars[bars.length - 1];
      const prevBar = bars[bars.length - 2];
      const avgVol50 = computeAvgVol(vols, 50);
      const relVol20 = computeRelVol(latest.v, avgVol20);
      const relVol50 = avgVol50 ? computeRelVol(latest.v, avgVol50) : null;
      const distPct = (latest.c - sma50) / sma50 * 100;
      const smaPrev = smaValues[smaValues.length - 2];
      const prevCloseVs50 = prevBar && smaPrev ? (prevBar.c - smaPrev) / smaPrev * 100 : 0;
      const closeLocation = computeCloseLocation(latest.o, latest.h, latest.l, latest.c);
      const status = classify50DMA(bars, smaValues);
      const direction = DIRECTION[status] || 'Neutral';
      const daysBelow = computeDaysOnSide(bars, smaValues, 'below');
      const daysAbove = computeDaysOnSide(bars, smaValues, 'above');
      const daysOnPrevSide = ['CA', 'FA', 'RC'].includes(status) ? daysBelow : daysAbove;

      const ret5d = bars.length >= 6 ? (latest.c - bars[bars.length - 6].c) / bars[bars.length - 6].c * 100 : null;
      const ret10d = bars.length >= 11 ? (latest.c - bars[bars.length - 11].c) / bars[bars.length - 11].c * 100 : null;

      const mcTier = marketCapTier(latestPrice, avgVol20);
      const mcFilter = liqFilters.marketCapTier;
      if (mcFilter !== 'All' && mcTier !== mcFilter) return null;

      const scores = computeSignalScore(status, distPct, relVol20, closeLocation, daysOnPrevSide);
      const meta = getMeta(ticker);

      const result = {
        ticker, company: meta.c, exchange: meta.e, sector: meta.s, industry: meta.i,
        status, direction,
        price: latest.c, prevClose: prevBar?.c,
        high: latest.h, low: latest.l, open: latest.o,
        sma50, distPct, currentClose: latest.c,
        prevCloseVs50, currentCloseVs50: distPct,
        volume: latest.v, avgVol20, avgVol50,
        relVol20, relVol50,
        closeLocation, ret5d, ret10d,
        daysOnPrevSide, mcTier,
        signalScore: scores.total, scores,
        dataFresh: true, demo: false,
        timestamp: new Date(latest.t || Date.now()).toISOString(),
        isNew: false,
      };
      result.explanation = generateExplanation(result);
      return result;
    }

    /* ─────────────── DIFF ─────────────── */
    function compareScans(current, prevMap) {
      const diff = { newAbove: [], newBelow: [], highRvol: [], rejections: [], testing: [] };
      for (const r of current) {
        const prev = prevMap[r.ticker];
        const isNew = !prev || prev !== r.status;
        r.isNew = isNew && ['CA', 'FA', 'RC', 'CB', 'FB', 'LS'].includes(r.status);
        if (isNew) {
          if (['CA', 'FA', 'RC'].includes(r.status)) diff.newAbove.push(r.ticker);
          if (['CB', 'FB', 'LS'].includes(r.status)) diff.newBelow.push(r.ticker);
        }
        if ((r.relVol20 || 0) > 2 && ['CA', 'FA', 'RC', 'CB', 'FB', 'LS'].includes(r.status)) diff.highRvol.push(r.ticker);
        if (r.status === 'RJ') diff.rejections.push(r.ticker);
        if (['TB', 'TA'].includes(r.status)) diff.testing.push(r.ticker);
      }
      return diff;
    }

    /* ─────────────── SORT ─────────────── */
    function sortResults(results, sortKey, sortDir) {
      const dir = sortDir === 'asc' ? 1 : -1;
      return [...results].sort((a, b) => {
        if (sortKey === 'default') {
          const pa = STATUS_PRIORITY[a.status] || 5, pb = STATUS_PRIORITY[b.status] || 5;
          if (pa !== pb) return pa - pb;
          return (b.relVol20 || 0) - (a.relVol20 || 0);
        }
        let va = a[sortKey], vb = b[sortKey];
        if (va == null) return 1; if (vb == null) return -1;
        if (typeof va === 'string') return va.localeCompare(vb) * dir;
        return (va - vb) * dir;
      });
    }

    /* ─────────────── ALERT HISTORY ─────────────── */
    function saveAlertHistory(results) {
      try {
        const existing = JSON.parse(localStorage.getItem(SK_HISTORY) || '[]');
        const today = new Date().toISOString().split('T')[0];
        const newAlerts = results
          .filter(r => ['CA', 'FA', 'RC', 'CB', 'FB', 'LS', 'RJ'].includes(r.status) && !r.demo)
          .map(r => ({
            alertId: `${r.ticker}-${today}-${r.status}`,
            alertDate: today, ticker: r.ticker, company: r.company,
            direction: r.direction, crossingStatus: STATUS_CODES[r.status] || r.status,
            signalScore: r.signalScore, price: r.price, sma50: r.sma50,
            relVol20: r.relVol20, distPct: r.distPct, outcomeLabel: 'Still Active',
          }));
        const merged = [...existing];
        for (const a of newAlerts) {
          if (!merged.find(e => e.alertId === a.alertId)) merged.push(a);
        }
        localStorage.setItem(SK_HISTORY, JSON.stringify(merged.slice(-500)));
      } catch (e) { }
    }

    /* ─────────────── MOCK DATA (DEMO) ─────────────── */
    function generateMock(ticker) {
      const meta = getMeta(ticker);
      const price = 5 + Math.random() * 495;
      const sma = price * (0.92 + Math.random() * 0.16);
      const distPct = (price - sma) / sma * 100;
      const vol = 500000 + Math.random() * 10000000;
      const avgVol = vol * (0.4 + Math.random() * 1.2);
      const rv = vol / avgVol;
      const statuses = ['CA', 'CB', 'FA', 'FB', 'TB', 'TA', 'HA', 'HB', 'RJ', 'RC', 'LS'];
      const weights = [8, 8, 5, 5, 10, 10, 20, 20, 5, 5, 5];
      let rnd = Math.random() * 100, acc = 0, status = 'HA';
      for (let i = 0; i < statuses.length; i++) { acc += weights[i]; if (rnd < acc) { status = statuses[i]; break; } }
      const cl = 0.2 + Math.random() * 0.6;
      const days = Math.floor(Math.random() * 30) + 1;
      const scores = computeSignalScore(status, distPct, rv, cl, days);
      const r = {
        ticker, company: meta.c, exchange: meta.e, sector: meta.s, industry: meta.i,
        status, direction: DIRECTION[status] || 'Neutral',
        price, prevClose: price * (0.97 + Math.random() * 0.06),
        high: price * (1 + Math.random() * 0.02), low: price * (0.98 + Math.random() * 0.01), open: price,
        sma50: sma, distPct, currentClose: price,
        prevCloseVs50: (price * (0.98 + Math.random() * 0.04) - sma) / sma * 100,
        currentCloseVs50: distPct,
        volume: Math.round(vol), avgVol20: Math.round(avgVol), avgVol50: Math.round(avgVol * 0.95),
        relVol20: rv, relVol50: vol / (avgVol * 0.95),
        closeLocation: cl, ret5d: (-8 + Math.random() * 16), ret10d: (-12 + Math.random() * 24),
        daysOnPrevSide: days, signalScore: scores.total, scores,
        dataFresh: true, timestamp: new Date().toISOString(), isNew: false, demo: true,
      };
      r.explanation = generateExplanation(r);
      return r;
    }

                      <div className="module-detail">{m.d}{m.w !== '—' && ` · Weight: ${m.w}`}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div className="modal-section-title">Return + Volume Summary</div>
                <div className="bottom-strip">
                  {[
                    { l: '5D Return', v: fmtPct(s.ret5d), c: s.ret5d >= 0 ? 'var(--green)' : 'var(--red)' },
                    { l: '10D Return', v: fmtPct(s.ret10d), c: s.ret10d >= 0 ? 'var(--green)' : 'var(--red)' },
                    { l: 'Rel Vol 20D', v: fmtRvol(s.relVol20), c: 'var(--blue)' },
                    { l: 'Rel Vol 50D', v: fmtRvol(s.relVol50), c: 'var(--teal)' },
                    { l: 'Volume', v: fmtVol(s.volume), c: 'var(--text)' },

                    { l: 'Close Loc', v: fmt((s.closeLocation || 0.5) * 100) + '%', c: 'var(--text-dim)' },

    /* ─────────────── LIVE SCAN DASHBOARD ─────────────── */
    function ScanDashboard({ state, onPause, onResume, onCancel, onDone, onViewPartial }) {
      const {
        isRunning, isPaused, isDone,
        tier, totalTickers, scannedCount, failedCount, skippedCount,
        batchIndex, totalBatches, batchSize,
        currentTicker, lastAlert,
        loadingStage, pct, resultsCount,
        resumeAvailable, resumeInfo,
      } = state;

      const tierInfo = TIERS[tier] || TIERS.T1;
      const pctDisplay = Math.min(100, Math.round(pct || 0));

      if (resumeAvailable && !isRunning && !isDone) {
        return (
          <div className="scan-dashboard">
            <div className="scan-dash-inner">
              <div className="scan-dash-title">RESUME PREVIOUS SCAN?</div>
              <div className="scan-resume-banner">
                <div className="scan-resume-text">
                  A previous <strong>{resumeInfo?.tier}</strong> scan was interrupted at batch <strong>{resumeInfo?.batchIndex}</strong> with <strong>{resumeInfo?.resultsCount}</strong> results saved.
                </div>
                <div className="scan-resume-btns">
                  <button className="scan-action-btn resume" onClick={() => onResume(true)}>RESUME</button>
                  <button className="scan-action-btn cancel" onClick={() => onResume(false)}>START FRESH</button>
                </div>
              </div>
            </div>
          </div>

      }

      return (
        <div className="scan-dashboard">
          <div className="scan-dash-inner">
            <div className="scan-dash-title">
              {isDone ? '✓ SCAN COMPLETE' : isPaused ? '⏸ SCAN PAUSED' : '50-DAY SMA CROSSING ENGINE'}
            </div>
            <div className="scan-dash-tier">
              SCANNING {tierInfo.label.toUpperCase()} · {tierInfo.approx.toLocaleString()} EST. STOCKS
            </div>

            <div>
              <div className="scan-progress-track">
                <div className="scan-progress-fill" style={{ width: `${pctDisplay}%` }} />
              </div>
              <div className="scan-progress-label">
                <span>{loadingStage || 'Initializing…'}</span>
                <span>{pctDisplay}%</span>
              </div>

            <div className="scan-stats-grid">
              <div className="scan-stat-card ok">
                <div className="s-label">Scanned</div>
                <div className="s-val">{scannedCount || 0}</div>
              </div>
              <div className="scan-stat-card info">
                <div className="s-label">Alerts</div>
                <div className="s-val">{resultsCount || 0}</div>
              </div>
              <div className="scan-stat-card warn">
                <div className="s-label">Skipped</div>
                <div className="s-val">{skippedCount || 0}</div>
              </div>
              <div className="scan-stat-card err">
                <div className="s-label">Failed</div>
                <div className="s-val">{failedCount || 0}</div>

            <div className="scan-current-box">
              <div className="scan-current-row">
                <span className="scan-current-label">BATCH</span>
                <span className="scan-current-val">{batchIndex || 0} / {totalBatches || '—'} ({batchSize} tickers/batch)</span>
              </div>
              <div className="scan-current-row">
                <span className="scan-current-label">TICKER</span>
                <span className="scan-current-val">{totalTickers ? `${(scannedCount || 0) + (failedCount || 0) + (skippedCount || 0)} / ${totalTickers}` : '—'}</span>
              </div>
              <div className="scan-current-row">
                <span className="scan-current-label">CURRENTLY SCANNING</span>
                <span className="scan-current-val" style={{ color: 'var(--blue)' }}>{currentTicker || '—'}</span>
              </div>
            </div>

            {lastAlert && (
              <div className="scan-latest-alert">
                <span className="scan-latest-label">LAST ALERT:</span>
                <span style={{ fontWeight: 700, color: lastAlert.direction === 'Bullish' ? 'var(--green)' : 'var(--red)' }}>{lastAlert.ticker}</span>
                <StatusBadge code={lastAlert.status} />
                <RvolCell rv={lastAlert.relVol20} />
                <span style={{ fontSize: 9, color: 'var(--text-muted)', marginLeft: 'auto' }}>Score: {lastAlert.signalScore}</span>
              </div>
            )}

            <div className="scan-btn-row">
              {!isDone && !isPaused && isRunning && (
                <button className="scan-action-btn pause" onClick={onPause}>⏸ PAUSE</button>
              )}
              {!isDone && isPaused && (
                <button className="scan-action-btn resume" onClick={() => onResume(false)}>▶ RESUME</button>
              )}
              {!isDone && (
                <button className="scan-action-btn cancel" onClick={onCancel}>✕ CANCEL</button>
              )}
              {isDone && (
                <button className="scan-action-btn done" onClick={onDone}>VIEW RESULTS →</button>
              )}
            </div>

            {(isDone || isPaused) && (resultsCount || 0) > 0 && (
              <div className="scan-note">
                {isDone ? `Scan complete. ${resultsCount} results ready.` : `${resultsCount} results available so far. Resume to continue or cancel to view partial results.`}
              </div>
            )}

            {!isDone && isRunning && (
              <div className="scan-note">
                Results are streaming into the table below as each batch completes.
                {tier === 'T3' || tier === 'T4' ? ' Long scan — use PAUSE at any time to view partial results.' : ''}
              </div>

            {isPaused && (
              <div className="scan-note warn">⚠ Scan paused. Click RESUME to continue from batch {batchIndex}.</div>
