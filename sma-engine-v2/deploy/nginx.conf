# ═══════════════════════════════════════════════════════════════════════════════
# 50-Day SMA Crossing Engine — nginx Config
# Place at: /etc/nginx/sites-available/sma-engine
# Enable:   ln -sf /etc/nginx/sites-available/sma-engine /etc/nginx/sites-enabled/
# SSL:      certbot --nginx -d yourdomain.com
# ═══════════════════════════════════════════════════════════════════════════════

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

upstream sma_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # Redirect HTTP → HTTPS after certbot runs
    # certbot will add the SSL block automatically
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # SSL — managed by certbot
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"            always;
    add_header X-Content-Type-Options   "nosniff"               always;
    add_header X-XSS-Protection         "1; mode=block"         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain application/json application/javascript text/css text/html;
    gzip_min_length 1000;

    # ── API routes ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass         http://sma_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';

        # Critical for SSE streaming (scan progress events)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Allow chunked responses (SSE)
        chunked_transfer_encoding on;
    }

    # ── Frontend static files ────────────────────────────────────────────────
    location / {
        proxy_pass         http://sma_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    on;
        proxy_read_timeout 30s;
    }

    # ── Health check (no rate limit) ─────────────────────────────────────────
    location /api/health {
        proxy_pass http://sma_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/sma-engine-access.log;
    error_log  /var/log/nginx/sma-engine-error.log;

    # ── Client max body size ─────────────────────────────────────────────────
    client_max_body_size 2m;
}
